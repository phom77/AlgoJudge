name: Backend CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: algojudge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d algojudge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_CONNECTION: Host=localhost;Port=5432;Database=algojudge_test;Username=postgres;Password=postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore AlgoJudge.slnx
      - run: dotnet build AlgoJudge.slnx --configuration Release --no-restore
      - run: dotnet test AlgoJudge.slnx --configuration Release --no-build

  judge-integration-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      TEST_DOCKER_JUDGE_IMAGE: algojudge/judge-cpp17:14.3.0-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build pinned C++17 judge image
        run: >-
          docker build
          --file infra/docker/judge-cpp17.Dockerfile
          --tag "$TEST_DOCKER_JUDGE_IMAGE"
          infra/docker
      - run: >-
          dotnet test
          tests/AlgoJudge.Judge.IntegrationTests/AlgoJudge.Judge.IntegrationTests.csproj
          --configuration Release

  backend-e2e-acceptance:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: algojudge_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d algojudge_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_CONNECTION: Host=localhost;Port=5432;Database=algojudge_e2e;Username=postgres;Password=postgres
      TEST_DOCKER_JUDGE_IMAGE: algojudge/judge-cpp17:14.3.0-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build pinned C++17 judge image
        run: >-
          docker build
          --file infra/docker/judge-cpp17.Dockerfile
          --tag "$TEST_DOCKER_JUDGE_IMAGE"
          infra/docker
      - name: Run backend end-to-end acceptance
        run: >-
          dotnet test
          tests/AlgoJudge.Backend.EndToEndTests/AlgoJudge.Backend.EndToEndTests.csproj
          --configuration Release
