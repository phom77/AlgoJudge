name: Backend CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore AlgoJudge.slnx
      - run: dotnet build AlgoJudge.slnx --configuration Release --no-restore
      - run: dotnet test AlgoJudge.slnx --configuration Release --no-build
