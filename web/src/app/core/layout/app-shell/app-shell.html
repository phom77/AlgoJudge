<header class="topbar">
  <div class="topbar__content">
    <a class="brand" routerLink="/problems" data-testid="brand" aria-label="AlgoJudge home">
      <span class="brand__mark" aria-hidden="true">A</span>
      <span>AlgoJudge</span>
    </a>

    <nav class="navigation" aria-label="Primary navigation">
      <a class="navigation__link" routerLink="/problems" routerLinkActive="navigation__link--active"
        >Problems</a
      >
      @if (authStore.isAuthenticated()) {
        <a
          class="navigation__link"
          routerLink="/submissions"
          routerLinkActive="navigation__link--active"
          >Submissions</a
        >
      }
    </nav>

    <div class="auth-actions" aria-live="polite">
      @if (authStore.isChecking()) {
        <span class="session-status">Restoring session…</span>
      } @else if (authStore.user(); as user) {
        <span class="session-user" [title]="user.email">{{ user.userName }}</span>
        <button
          class="logout-button"
          type="button"
          [disabled]="authStore.isSubmitting()"
          (click)="logout()"
        >
          {{ authStore.isSubmitting() ? 'Signing out…' : 'Sign out' }}
        </button>
      } @else {
        <a class="sign-in" routerLink="/login">Sign in</a>
      }
    </div>
  </div>
</header>

<main class="main-content">
  <router-outlet />
</main>
