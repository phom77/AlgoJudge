name: algojudge-dev

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-AlgoJudgeDb}
      POSTGRES_USER: ${POSTGRES_USER:-algojudge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - algojudge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algojudge} -d ${POSTGRES_DB:-AlgoJudgeDb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-AlgoJudgeDb};Username=${POSTGRES_USER:-algojudge};Password=${POSTGRES_PASSWORD}
      Jwt__SecretKey: ${JWT_SECRET}
    ports:
      - "${API_PORT:-5016}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  algojudge-postgres-data:
